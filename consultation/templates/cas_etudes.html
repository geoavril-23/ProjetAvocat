{% extends 'base.html' %}
{% load static %}

{% block title %}Jurisprudence - FOYAK TOGO{% endblock %}

{% block content %}
<section class="hero-wrap hero-wrap-2" style="background-image: url('{% static 'images/bg_1.jpg' %}');" data-stellar-background-ratio="0.5">
  <div class="overlay"></div>
  <div class="container">
    <div class="row no-gutters slider-text align-items-end justify-content-center">
      <div class="col-md-9 ftco-animate pb-5 text-center">
        <h1 class="mb-3 bread">Études de Cas</h1>
        <p class="breadcrumbs"><span class="mr-2"><a href="{% url 'index' %}">Accueil <i class="ion-ios-arrow-forward"></i></a></span> <span>Cas <i class="ion-ios-arrow-forward"></i></span></p>
      </div>
    </div>
  </div>
</section>

<section class="ftco-section">
  <div class="container">
    <div class="row">
      {% for i in "123456" %}
      <div class="col-md-4 ftco-animate mb-4">
        <div class="case img d-flex align-items-center justify-content-center" style="background-image: url({% static 'images/case-' %}{{i}}.jpg);">
          <div class="text text-center">
            <h3><a href="#">Litige Résolu #{{i}}</a></h3>
            <span>Domaine Juridique</span>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}

{% extends 'admin/base.html' %}

{% block title %}Modifier le Dossier #{{ demande.id }} - FOYAK{% endblock %}

{% block content %}
<div class="container-fluid pt-4 px-4">
    <div class="row g-4 justify-content-center">
        <div class="col-sm-12 col-xl-8">
            <div class="bg-light rounded h-100 p-4 shadow-lg border border-warning">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="mb-0 text-warning"><i class="fa fa-edit me-2"></i>Modification du Dossier Client</h6>
                    <a href="{% url 'admin_consultations' %}" class="btn btn-outline-secondary btn-sm"><i class="fa fa-arrow-left"></i> Retour</a>
                </div>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nom du Client</label>
                            <input type="text" name="nom" class="form-control" value="{{ demande.nom }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Prénom du Client</label>
                            <input type="text" name="prenom" class="form-control" value="{{ demande.prenom }}">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ demande.email }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Téléphone</label>
                            <input type="text" name="telephone" class="form-control" value="{{ demande.telephone }}">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Domaine Juridique</label>
                            <select name="domaine" class="form-select">
                                <option value="FONCIER" {% if demande.domaine == 'FONCIER' %}selected{% endif %}>Foncier et Immobilier</option>
                                <option value="FAMILLE" {% if demande.domaine == 'FAMILLE' %}selected{% endif %}>Droit de la Famille</option>
                                <option value="TRAVAIL" {% if demande.domaine == 'TRAVAIL' %}selected{% endif %}>Droit du Travail</option>
                                <option value="AFFAIRES" {% if demande.domaine == 'AFFAIRES' %}selected{% endif %}>Droit des Affaires</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Statut du Dossier</label>
                            <select name="statut" class="form-select bg-white border">
                                <option value="ATTENTE" {% if demande.statut == 'ATTENTE' %}selected{% endif %}>En attente</option>
                                <option value="EN_COURS" {% if demande.statut == 'EN_COURS' %}selected{% endif %}>Traitement en cours</option>
                                <option value="TERMINE" {% if demande.statut == 'TERMINE' %}selected{% endif %}>Terminé / Archivé</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description du Cas / Notes</label>
                        <textarea name="description" class="form-control" rows="5">{{ demande.description }}</textarea>
                    </div>
                    
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-warning px-5"><i class="fa fa-save me-2"></i>Enregistrer les modifications</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

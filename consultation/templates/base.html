{% load static %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>{% block title %}Judge - FOYAK TOGO{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700,800,900" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:400,400i,700,700i,900,900i&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/open-iconic-bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.theme.default.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}">
    <link rel="stylesheet" href="{% static 'css/aos.css' %}">
    <link rel="stylesheet" href="{% static 'css/ionicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/flaticon.css' %}">
    <link rel="stylesheet" href="{% static 'css/icomoon.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Smooth transitions */
        body, .ftco-section, .navbar, .bg-light, .bg-white {
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        /* PREMIUM DARK MODE - Noir Absolu */
        body.dark-theme { 
            background-color: #000000 !important; 
            color: #cbd5e1 !important; 
        }
        body.dark-theme .ftco-section { background-color: transparent !important; }
        body.dark-theme .bg-light, body.dark-theme .bg-white { 
            background-color: #111111 !important; 
            border: 1px solid #222222;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.8);
        }
        body.dark-theme h1, body.dark-theme h2, body.dark-theme h3, 
        body.dark-theme h4, body.dark-theme h5, body.dark-theme h6 { 
            color: #f8fafc !important; 
        }
        body.dark-theme .text-dark { color: #f8fafc !important; }
        body.dark-theme p, body.dark-theme span { color: #cbd5e1 !important; }
        
        /* Navbar */
        body.dark-theme .navbar { 
            background-color: rgba(0, 0, 0, 0.95) !important; 
            border-bottom: 1px solid #222222 !important; 
            backdrop-filter: blur(10px);
        }
        body.dark-theme .navbar .nav-link { color: #cbd5e1 !important; }
        body.dark-theme .navbar .nav-link:hover { color: #38bdf8 !important; }

        /* Footer */
        body.dark-theme .ftco-footer { 
            background-color: #050505 !important; 
            border-top: 1px solid #111111;
        }

        /* Form Inputs */
        body.dark-theme input.form-control, body.dark-theme textarea.form-control {
            background-color: #000000 !important;
            border: 1px solid #222222 !important;
            color: #f8fafc !important;
        }
        body.dark-theme input.form-control:focus, body.dark-theme textarea.form-control:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.25) !important;
            background-color: #000000 !important;
        }

        /* Icons & Accents */
        body.dark-theme .icon span { color: #38bdf8 !important; }
        body.dark-theme .text-primary { color: #38bdf8 !important; }
    </style>
  </head>
  <body class="{% if site_config.theme_actuel == 'DARK' %}dark-theme{% endif %}">
    
    {% include 'partials/navbar.html' %}

    {% block content %}
    {% endblock %}

    {% include 'partials/footer.html' %}
    
    <div id="ftco-loader" class="show fullscreen"><svg class="circular" width="48px" height="48px"><circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee"/><circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10" stroke="#F96D00"/></svg></div>

    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/jquery-migrate-3.0.1.min.js' %}"></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/jquery.easing.1.3.js' %}"></script>
    <script src="{% static 'js/jquery.waypoints.min.js' %}"></script>
    <script src="{% static 'js/jquery.stellar.min.js' %}"></script>
    <script src="{% static 'js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'js/jquery.magnific-popup.min.js' %}"></script>
    <script src="{% static 'js/aos.js' %}"></script>
    <script src="{% static 'js/jquery.animateNumber.min.js' %}"></script>
    <script src="{% static 'js/scrollax.min.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
  </body>
</html>
